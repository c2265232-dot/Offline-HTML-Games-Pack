<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Arcade Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 30px;
            margin: 0;
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .upload-section {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed #00ffcc;
            display: inline-block;
            margin-bottom: 30px;
        }
        input[type="file"] {
            color: #00ffcc;
            cursor: pointer;
        }
        .search-box {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            margin: 10px auto 30px auto;
            display: none; /* Hidden until folder is scanned */
            border: 2px solid #333;
            border-radius: 25px;
            background-color: #1e1e1e;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #00ffcc;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .game-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            text-transform: capitalize;
        }
        .game-card:hover {
            transform: translateY(-5px);
            background-color: #252525;
            border-color: #00ffcc;
            box-shadow: 0 7px 14px rgba(0, 255, 204, 0.2);
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Ultimate Offline Arcade 🎮</h1>
        <p>Select your downloaded <strong>offline</strong> folder to load all 300+ games instantly.</p>
        
        <div class="upload-section">
            <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>

        <br>
        <input type="text" id="searchBox" class="search-box" placeholder="Search games...">

        <div class="grid" id="gameGrid"></div>
    </div>

    <script>
        const folderInput = document.getElementById('folderInput');
        const gameGrid = document.getElementById('gameGrid');
        const searchBox = document.getElementById('searchBox');
        let allGames = [];

        folderInput.addEventListener('change', (event) => {
            const files = event.target.files;
            gameGrid.innerHTML = ''; // Clear layout
            allGames = [];

            // Filter out only HTML files from the selected folder
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.name.endsWith('.html') && file.name !== 'index.html') {
                    
                    // Clean up the file name to look like a clean title
                    let gameTitle = file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
                    
                    // Create an object mapping the name and the local temporary browser URL
                    allGames.push({
                        title: gameTitle,
                        url: URL.createObjectURL(file)
                    });
                }
            }

            // Sort them alphabetically
            allGames.sort((a, b) => a.title.localeCompare(b.title));

            // Display them and show search bar
            if(allGames.length > 0) {
                searchBox.style.display = 'block';
                displayGames(allGames);
            }
        });

        function displayGames(gamesList) {
            gameGrid.innerHTML = '';
            gamesList.forEach(game => {
                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = game.url;
                card.target = '_blank';
                card.innerText = game.title;
                gameGrid.appendChild(card);
            });
        }

        // Search filtering functionality
        searchBox.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = allGames.filter(game => game.title.toLowerCase().includes(searchTerm));
            displayGames(filteredGames);
        });
    </script>
</body>
</html>
