<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 30px;
        }
        h1 { color: #00ffcc; }
        .upload-btn {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed #00ffcc;
            display: inline-block;
            margin-bottom: 20px;
        }
        input[type="file"] { color: #00ffcc; cursor: pointer; }
        .search-box {
            width: 80%; max-width: 400px; padding: 12px;
            margin: 10px auto 20px auto; display: none;
            border: 2px solid #333; border-radius: 25px;
            background-color: #1e1e1e; color: white; text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto;
        }
        .game-card {
            background-color: #1e1e1e; padding: 20px;
            border-radius: 8px; text-decoration: none; color: white;
            font-weight: bold; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            min-height: 50px; text-transform: capitalize;
        }
        .game-card:hover {
            border-color: #00ffcc; color: #00ffcc; transform: scale(1.03);
        }
    </style>
</head>
<body>

    <h1>🎮 Offline Arcade Hub 🎮</h1>
    <p>Click below and select the folder where your games are located.</p>
    
    <div class="upload-btn">
        <input type="file" id="picker" webkitdirectory directory multiple>
    </div>

    <input type="text" id="search" class="search-box" placeholder="Search games...">
    <div class="grid" id="grid"></div>

    <script>
        const picker = document.getElementById('picker');
        const grid = document.getElementById('grid');
        const search = document.getElementById('search');
        let gamesList = [];

        picker.addEventListener('change', (e) => {
            const files = e.target.files;
            gamesList = [];
            grid.innerHTML = "";

            for (let file of files) {
                if (file.name.endsWith('.html') && file.name !== 'index.html') {
                    gamesList.push({
                        name: file.name.replace('.html', '').replace(/-/g, ' '),
                        url: URL.createObjectURL(file)
                    });
                }
            }

            gamesList.sort((a, b) => a.name.localeCompare(b.name));

            if (gamesList.length > 0) {
                search.style.display = "block";
                render(gamesList);
            }
        });

        function render(list) {
            grid.innerHTML = "";
            list.forEach(game => {
                const a = document.createElement('a');
                a.className = 'game-card';
                a.href = game.url;
                a.target = '_blank';
                a.innerText = game.name;
                grid.appendChild(a);
            });
        }

        search.addEventListener('input', (e) => {
            const text = e.target.value.toLowerCase();
            render(gamesList.filter(g => g.name.toLowerCase().includes(text)));
        });
    </script>
</body>
</html>
