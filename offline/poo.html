<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Arcade Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 30px;
            margin: 0;
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .status {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .search-box {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            margin: 0 auto 30px auto;
            display: block;
            border: 2px solid #333;
            border-radius: 25px;
            background-color: #1e1e1e;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #00ffcc;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            text-transform: capitalize;
        }
        .game-card:hover {
            transform: translateY(-5px);
            background-color: #252525;
            border-color: #00ffcc;
            box-shadow: 0 7px 14px rgba(0, 255, 204, 0.2);
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>🎮 Ultimate Arcade Hub 🎮</h1>
    <div id="statusMessage" class="status">Loading game list...</div>
    
    <input type="text" id="searchBox" class="search-box" placeholder="Search 300+ games...">

    <div class="grid" id="gameGrid"></div>

    <script>
        const gameGrid = document.getElementById('gameGrid');
        const searchBox = document.getElementById('searchBox');
        const statusMessage = document.getElementById('statusMessage');
        let allGames = [];

        // Fetching the complete file list directly from the GitHub repository API
        const repoUrl = "https://api.github.com/repos/CoolDude2349/Offline-HTML-Games-Pack/contents/offline";

        async function fetchGames() {
            try {
                const response = await fetch(repoUrl);
                const files = await response.json();
                
                // Filter down to only HTML files
                const htmlFiles = files.filter(file => file.name.endsWith('.html'));
                
                allGames = htmlFiles.map(file => {
                    return {
                        // Create a pretty title out of the filename
                        title: file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' '),
                        // Link directly into your local offline folder
                        localPath: `offline/${file.name}`
                    };
                });

                // Sort alphabetically
                allGames.sort((a, b) => a.title.localeCompare(b.title));
                
                statusMessage.innerText = `${allGames.length} games loaded completely!`;
                displayGames(allGames);

            } catch (error) {
                console.error("Error loading games:", error);
                statusMessage.innerText = "Failed to auto-load list. Make sure you are connected to the internet.";
            }
        }

        function displayGames(gamesList) {
            gameGrid.innerHTML = '';
            gamesList.forEach(game => {
                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = game.localPath;
                card.target = '_blank';
                card.innerText = game.title;
                gameGrid.appendChild(card);
            });
        }

        // Live search filtering feature
        searchBox.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = allGames.filter(game => game.title.toLowerCase().includes(searchTerm));
            displayGames(filteredGames);
        });

        // Run the script on startup
        fetchGames();
    </script>
</body>
</html>
